schema_version: 1
goal: "dual-pane-cleanup-ui"
status: complete
objective: "把 Codex 历史清理器前端重构成双栏极客风界面：顶部只保留紧凑操作区与文字版摘要，概览和策略区瘦身，本地清理计划改成 DELETE 二次确认弹窗，移除高级详情，并保留现有清理、备份、恢复和导出能力。"
start_point: "当前页面仍是顶部品牌区 + 左侧概览/策略 + 中间会话列表 + 右侧本地清理计划三栏布局；顶部占用偏大，摘要仍是大卡片，高级详情仍在主界面，确认口令仍是 CLEAN，整体信息密度和层级不符合 owner 要的简化双栏工具界面。"
acceptance:
  - "顶部左侧全部移除，顶部区域压成更紧凑的操作区，承接更换目录、打开备份目录、重新扫描和删除预览入口。"
  - "顶部摘要改成简短文字，不保留大卡片，删除预览入口使用普通小按钮。"
  - "概览只保留总会话、已归档、重复项、扫描对象、未识别对象。"
  - "控制区移除策略按钮与说明文案，只保留状态、目录、时间、大小筛选和全部安全选项。"
  - "独立本地清理计划整栏移除，相关摘要改到顶部，并用删除预览弹窗承接 DELETE 二次确认。"
  - "整个高级详情部分移除。"
  - "整体改成双栏极客风工具布局，并保留现有备份、恢复与导出能力。"
non_goals:
  - "不重写后端删除、备份、回滚和证据导出链路。"
  - "不扩展新的清理策略或数据模型。"
  - "不引入新的前端框架或外部弹窗库。"
